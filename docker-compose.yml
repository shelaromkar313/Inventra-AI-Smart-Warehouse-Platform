services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: smart_warehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/smart_warehouse
      ML_SERVICE_URL: http://ml-service:8001
      CV_SERVICE_URL: http://cv-service:8002
      RAG_SERVICE_URL: http://rag-service:8003
    depends_on:
      - db

  ml-service:
    build: ./ml-service
    ports:
      - "8001:8001"
    environment:
      PORT: 8001

  cv-service:
    build: ./cv-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002

  rag-service:
    build: ./rag-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003

volumes:
  db_data:
